name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ManifestApp.slnx

      - name: Build Core tests
        run: dotnet build ManifestApp.Core.Tests/ManifestApp.Core.Tests.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test ManifestApp.Core.Tests/ManifestApp.Core.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Build app
        run: dotnet build ManifestApp/ManifestApp.csproj --configuration Release --no-restore
